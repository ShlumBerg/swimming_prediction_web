    //Показать ошибку в виде всплывающего сообщения
    function showErrorToast(message) {
        const container = document.querySelector('.toast-container');
        const toastEl = document.createElement('div');
        toastEl.className = 'toast';
        toastEl.setAttribute('role', 'alert');
        toastEl.classList.add('mb-1');
        toastEl.classList.add('toast-placement');
        toastEl.classList.add('toast-placement-md');
        toastEl.innerHTML = `
    <div class="toast-header ">
        <span>❌</span>
        <strong class="ms-2 me-auto">Ошибка</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
    </div>
    <div class="toast-body">${message}</div>
  `;
        container.appendChild(toastEl);
        const toast = new bootstrap.Toast(toastEl, { autohide: false }); //Не закрывать сообщение автоматически
        toast.show();
        //Автоудаление после скрытия
        toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
    }

    //Убрать красную обводку при выборе корректного значения
    function onSelectedForField(field) {
        field.disabled = true;
        if (!field.value || field.value === "") {
            field.disabled = false;
            return
        }

        const previousValue = field.dataset.previousValue ?? null; //предыдущее значение
        field.dataset.previousValue = field.value;                 //сохраняем текущее как предыдущее

        //Убираем красную обводку для обертки томселект
        if (field && field.tomselect && field.tomselect.wrapper) {
            field.tomselect.wrapper.classList.remove('is-invalid');
        }

        if (field.id == "selectSex" && previousValue !== field.value) {

            if (field.value == "M") {
                swimmersDict = maleSwimmersDict
            }
            else {
                swimmersDict = femaleSwimmersDict
            }
        }

        field.classList.remove('is-invalid')
        field.disabled = false;
    }

            disciplineInputData.heatsPhaseSwims[swimInd].swim_datetime_local_iso = dt_str
        }
        else if (phase == "Semifinals") {

        }
        else if (phase == "Finals") {
            disciplineInputData.finalsPhaseSwims[swimInd].swim_datetime_local_iso = dt_str
        }

        document.getElementById("swimInputInvalidFeedback").classList.add('d-none')
    }

    //При выборе пловца для дорожки заплыва
    function onSelectedForSwimmerFieldForSwimInput(inputSwimmerSelect, phase, swimInd, laneNumb) {
        function updateSwimmersInArray(arr, laneNumb, swimmerId) {
            const indexOfSwimmerCurrentlyInArray = arr.findIndex(x => x.lane === laneNumb);
            if (indexOfSwimmerCurrentlyInArray !== -1) {
                if (!swimmerId) {
                    arr.splice(indexOfSwimmerCurrentlyInArray, 1);
                }
                else {
                    arr[indexOfSwimmerCurrentlyInArray].id = swimmerId;
                }
                //Убрать сообщение об ошибке
                document.getElementById("swimInputInvalidFeedback").classList.add('d-none')
            }
            else if (swimmerId) {
                const indexBeforeWhichToInsert = arr.findIndex(x => x.lane > laneNumb);
                if (indexBeforeWhichToInsert === -1) {
                    arr.push({ "lane": laneNumb, "id": swimmerId });
                } else {
                    arr.splice(indexBeforeWhichToInsert, 0, { "lane": laneNumb, "id": swimmerId });
                }
                //Убрать сообщение об ошибке
                document.getElementById("swimInputInvalidFeedback").classList.add('d-none')
            }
        }
        const swimmer_id = inputSwimmerSelect.value;
        let arr = [];
        if (phase == "Heats") {
            if (!disciplineInputData.heatsPhaseSwims[swimInd].swimmersArray) {
                disciplineInputData.heatsPhaseSwims[swimInd].swimmersArray = [];
            }
            arr = disciplineInputData.heatsPhaseSwims[swimInd].swimmersArray;
        }
        else if (phase == "Semifinals") {
            if (!disciplineInputData.semifinalsPhaseSwims[swimInd].swimmersArray) {
                disciplineInputData.semifinalsPhaseSwims[swimInd].swimmersArray = [];
            }
            arr = disciplineInputData.semifinalsPhaseSwims[swimInd].swimmersArray;
        }
        else if (phase == "Finals") {
            if (!disciplineInputData.finalsPhaseSwims[swimInd].swimmersArray) {
                disciplineInputData.finalsPhaseSwims[swimInd].swimmersArray = [];
            }
            arr = disciplineInputData.finalsPhaseSwims[swimInd].swimmersArray;
        }
        updateSwimmersInArray(arr, laneNumb, swimmer_id)

    }

    //После выбора числа элементов
    function applyPhaseSwimCount(phase) //phase - фаза для которой выбрали число элементов
    {
        function validate() {
            if (!document.getElementById("inputPhaseSwimCount").value) {
                document.getElementById('inputPhaseSwimCount').classList.add('is-invalid');
                return false;
            }
            let count = document.getElementById("inputPhaseSwimCount").value

            let maxVal = 0

                minVal = MIN_SWIMS_NUMBER_IN_HEATS
                maxVal = MAX_SWIMS_NUMBER_IN_HEATS
            }
            else if (phase == "Finals") {
                minVal = MIN_SWIMS_NUMBER_IN_FINALS

            }

    //После ввода формы с общими сведениями о дисциплине
    function applyDisciplineData() {
        function validate(style, distance, sex, poolLength, hostCountryCode, hostRegion, hasSemifinals, hasFinals) {
            let isValid = true;
            if (!style || style === "") {
                document.getElementById('selectStyle').classList.add('is-invalid');
                isValid = false;
            }
            if (!distance || distance === "") {
                document.getElementById('selectDistance').classList.add('is-invalid');
                isValid = false;
            }
            if (!sex || sex === "") {
                document.getElementById('selectSex').classList.add('is-invalid');
                isValid = false;
            }
            if (!poolLength || poolLength === "") {
                document.getElementById('selectPoolLength').classList.add('is-invalid');
                isValid = false;
            }
            if (!hostCountryCode || hostCountryCode === "" || !hostRegion || !["Oceania", "Americas", "Europe", "Asia", "Africa"].includes(hostRegion)) //Если не выбрана страна либо для страны нет региона
            {
                //При наличии обертки томселект указываем стиль отображения обертки как ошибочный
                const selectHostCountry = document.getElementById('selectHostCountry');
                if (selectHostCountry && selectHostCountry.tomselect && selectHostCountry.tomselect.wrapper) {
                    selectHostCountry.tomselect.wrapper.classList.add('is-invalid');
                }
                else { //При отсутствии обертки томселект указываем стиль отображения селекта как ошибочный
                    selectHostCountry.classList.add('is-invalid');
                }
                isValid = false;
            }
            return isValid;
        }
        function disableInputs() {
            document.getElementById("selectStyle").disabled = true;
            document.getElementById("selectDistance").disabled = true;
            document.getElementById("selectSex").disabled = true;
            document.getElementById("selectPoolLength").disabled = true;
            document.getElementById("selectHostCountry").disabled = true;
            document.getElementById('selectHostCountry').tomselect.disable();
            document.getElementById("checkHasSemifinals").disabled = true;
            document.getElementById("checkHasHeats").disabled = true;
            document.getElementById("buttonApplyDisciplineData").disabled = true;
        }
        const style = document.getElementById("selectStyle").value;
        const distance = document.getElementById("selectDistance").value;
        const sex = document.getElementById("selectSex").value;
        const poolLength = document.getElementById("selectPoolLength").value;
        const hostCountryCode = document.getElementById("selectHostCountry").value;
        const hostRegion = hostCountries.find(x => x.code === hostCountryCode)?.region;
        const hasSemifinals = document.getElementById("checkHasSemifinals").checked;
        const hasHeats = document.getElementById("checkHasHeats").checked;
        if (!validate(style, distance, sex, poolLength, hostCountryCode, hostRegion, hasSemifinals, hasHeats)) {
            return;
        }
        disciplineInputData.sex = sex;
        disciplineInputData.style = style;
        disciplineInputData.distance = Number(distance);
        disciplineInputData.poolLength = Number(poolLength);
        disciplineInputData.hostCountryCode = hostCountryCode;
        disciplineInputData.hostRegion = hostRegion;
        disciplineInputData.finalsPhaseSwims = [{}];
        if (hasHeats) {
            disciplineInputData.heatsPhaseSwims = [];
        }
        else {
            disciplineInputData.heatsPhaseSwims = null;
        }
        if (hasSemifinals) {
            disciplineInputData.semifinalsPhaseSwims = [{}, {}];
        }
        else {
            disciplineInputData.semifinalsPhaseSwims = null;
        }
        disableInputs();
        if (!hasHeats && !hasSemifinals) {
            displayCardInputsForPhaseSwimCount("Finals")
        }
        else if (hasHeats) {
            displayCardInputsForPhaseSwimCount("Heats")
        }
        else {
            displayCardInputsForSwimSelection();
        }
    }

            function checkIfThereIsMinimumTimeBetweenPhases() {
                prevPhaseMaxDateTime = new Date(1950, 1, 1, 1, 1, 1);
                prevPhaseStr = "";
                if (disciplineInputData.heatsPhaseSwims) {
                    let minPhaseDate = new Date(disciplineInputData.heatsPhaseSwims[0].swim_datetime_local_iso);
                    let maxPhaseDate = new Date(disciplineInputData.heatsPhaseSwims[0].swim_datetime_local_iso);
                    for (let i = 1; i < disciplineInputData.heatsPhaseSwims.length; i++) {
                        minPhaseDate = new Date(Math.min(minPhaseDate.getTime(), new Date(disciplineInputData.heatsPhaseSwims[i].swim_datetime_local_iso).getTime()));
                        maxPhaseDate = new Date(Math.max(maxPhaseDate.getTime(), new Date(disciplineInputData.heatsPhaseSwims[i].swim_datetime_local_iso).getTime()));
                    }
                    prevPhaseMaxDateTime = maxPhaseDate;
                    prevPhaseStr = "отборочных"
                }
                if (disciplineInputData.semifinalsPhaseSwims) {
                    let minPhaseDate = new Date(disciplineInputData.semifinalsPhaseSwims[0].swim_datetime_local_iso);
                    let maxPhaseDate = new Date(disciplineInputData.semifinalsPhaseSwims[0].swim_datetime_local_iso);
                    for (let i = 1; i < disciplineInputData.semifinalsPhaseSwims.length; i++) {
                        minPhaseDate = new Date(Math.min(minPhaseDate.getTime(), new Date(disciplineInputData.semifinalsPhaseSwims[i].swim_datetime_local_iso).getTime()));
                        maxPhaseDate = new Date(Math.max(maxPhaseDate.getTime(), new Date(disciplineInputData.semifinalsPhaseSwims[i].swim_datetime_local_iso).getTime()));
                    }
                    if (new Date(prevPhaseMaxDateTime.getTime() + MIN_TIMEDELTA_BETWEEN_PHASES) > minPhaseDate) {
                        return { "checkPassed": false, "errorMessage": `Фаза полуфинала начинается раньше, чем через ${MIN_TIMEDELTA_BETWEEN_PHASES_STR} после фазы ${prevPhaseStr}!` };
                    }
                    prevPhaseMaxDateTime = maxPhaseDate;
                    prevPhaseStr = "полуфинала"
                }
                let minPhaseDate = new Date(disciplineInputData.finalsPhaseSwims[0].swim_datetime_local_iso);
                let maxPhaseDate = new Date(disciplineInputData.finalsPhaseSwims[0].swim_datetime_local_iso);
                for (let i = 1; i < disciplineInputData.finalsPhaseSwims.length; i++) {
                    minPhaseDate = new Date(Math.min(minPhaseDate.getTime(), new Date(disciplineInputData.finalsPhaseSwims[i].swim_datetime_local_iso).getTime()));
                    maxPhaseDate = new Date(Math.max(maxPhaseDate.getTime(), new Date(disciplineInputData.finalsPhaseSwims[i].swim_datetime_local_iso).getTime()));
                }
                if (new Date(prevPhaseMaxDateTime.getTime() + MIN_TIMEDELTA_BETWEEN_PHASES) > minPhaseDate) {
                    return { "checkPassed": false, "errorMessage": `Фаза финала начинается раньше, чем через ${MIN_TIMEDELTA_BETWEEN_PHASES_STR} после фазы ${prevPhaseStr}!` };
                }
                prevPhaseMaxDateTime = maxPhaseDate;
                prevPhaseStr = "финала"
                return { "checkPassed": true, "errorMessage": `` };
            }

            const errorPopup = document.getElementById("swimInputInvalidFeedback");
            let { checkPassed, errorMessage } = checkIfTimesInsideEverySwim();
            if (!checkPassed) {
                errorPopup.classList.remove('d-none');
                errorPopup.innerHTML = errorMessage;
                return false;
            }
            ({ checkPassed, errorMessage } = checkIfSwimmersInsideEveryEntrySwim());
            if (!checkPassed) {
                errorPopup.classList.remove('d-none');
                errorPopup.innerHTML = errorMessage;
                return false;
            }
            ({ checkPassed, errorMessage } = checkIfNoDuplicateSwimmersInEntryPhase());
            if (!checkPassed) {
                errorPopup.classList.remove('d-none');
                errorPopup.innerHTML = errorMessage;
                return false;
            }
            ({ checkPassed, errorMessage } = checkIfSwimsInsidePhaseOrderedBySwimTime());
            if (!checkPassed) {
                errorPopup.classList.remove('d-none');
                errorPopup.innerHTML = errorMessage;
                return false;
            }
            ({ checkPassed, errorMessage } = checkIfThereIsMinimumTimeBetweenPhases());
            if (!checkPassed) {
                errorPopup.classList.remove('d-none');
                errorPopup.innerHTML = errorMessage;
                return false;
            }
            return true;
        }

        function createQuery() {
            function parseSwimsArrayIntoJSArray(arr) {
                if (!arr) {
                    return arr
                }
                returnArr = []
                for (let i = 0; i < arr.length; i++) {
                    const newElem = {
                        "swim_datetime_local_iso": arr[i].swim_datetime_local_iso,
                    }
                    if (arr[i].swimmersArray) {
                        newElem['swimmers_array'] = []
                        for (let j = 0; j < arr[i].swimmersArray.length; j++) {
                            const id = arr[i].swimmersArray[j].id;
                            const swimmer = swimmersDict[id];
                            const newSwimmer = {
                                "lane": arr[i].swimmersArray[j].lane,
                                "id": id,
                                "country_code": swimmer.country_code,
                                "height": swimmer.height,
                                "dob": swimmer.dob,
                            }
                            newElem['swimmers_array'].push(newSwimmer);
                        }
                    }
                    returnArr.push(newElem);
                }
                return returnArr;
            }
            let jsInput = {
                "discipline_sex": disciplineInputData.sex,
                "discipline_distance": disciplineInputData.distance,
                "discipline_style": disciplineInputData.style,
                "discipline_pool_length": disciplineInputData.poolLength,
                "host_country_code": disciplineInputData.hostCountryCode,
                "host_region": disciplineInputData.hostRegion,
                "finals_phase_swims": parseSwimsArrayIntoJSArray(disciplineInputData.finalsPhaseSwims),
                "semifinals_phase_swims": parseSwimsArrayIntoJSArray(disciplineInputData.semifinalsPhaseSwims),
                "heats_phase_swims": parseSwimsArrayIntoJSArray(disciplineInputData.heatsPhaseSwims)
            }
            return jsInput;
        }

        function getPredictionsFromQuery(body) {
            axios.post("/disciplinePrediction", body).then(response => processPredictions(response.data)).catch(err => showErrorToast(err))
        }

        //Если не прошло минимальное время между нажатиями кнопки, не делаем предсказание (чтобы не перегружать сервер)
        curTime=Date.now();
        if(curTime<timerForPredictButton+MILLISECONDS_BETWEEN_BUTTON_PRESSESS_FOR_PREDICTIONS){
            return;
        }
        timerForPredictButton=curTime;

        if (!validateInput()) {
            return
        }
        const inputJSON = createQuery();
        getPredictionsFromQuery(inputJSON);
    }

    //Функция для обработки предсказаний после их получения
    function processPredictions(data) {
        function clearPredictions() {
            const resultsCard = document.getElementById('resultsCard');
            if (resultsCard) {
                resultsCard.remove();
            }
        }
        function displayPredictions() {
            function generateInnerHTMLForSinglePhase(phase) {
                const swimsStrArray = [];
                let arr = [];
                let phaseText = "";
                if (phase == "Heats") {
                    arr = predictions.heats_phase_swims;
                    phaseText = "отборочных";
                }
                else if (phase == "Finals") {
                    arr = predictions.finals_phase_swims;
                    phaseText = "финала";
                }
                else if (phase == "Semifinals") {
                    arr = predictions.semifinals_phase_swims;
                    phaseText = "полуфинала";
                }
                for (let i = 0; i < arr.length; i++) {
                    let swimmersStrArray = [];
                    for (let j = 0; j < arr[i].swimmers_array.length; j++) {
                        let swimmer = arr[i].swimmers_array[j]
                        let swimmerStr = `<div class="row g-0 border-top border-bottom">
                                <div class="col-12 col-md-6 col-lg-2 ps-2 pt-1 pt-md-0 ">
                                    <div class="text-secondary small">Дорожка:</div>
                                    <div class="fw-semibold" id="">${swimmer.lane}</div>
                                </div>
                                <div class="col-12 col-md-6 col-lg-2 ps-2 pt-1 pt-md-0 ">
                                    <div class="text-secondary small">Пловец:</div>
                                    <div class="fw-semibold" id="">${swimmersDict[swimmer.id].full_name}</div>
                                </div>
                                <div class="col-12 col-md-6 col-lg-2 ps-2 pt-1 pt-md-0">
                                    <div class="text-secondary small">Время:</div>
                                    <div class="fw-semibold" id="">${formatResultTime(swimmer.predicted_time)}</div>
                                </div>
                                <div class="col-12 col-md-6 col-lg-2 ps-2 pt-1 pt-md-0">
                                    <div class="text-secondary small">Место (заплыв):</div>
                                    <div class="fw-semibold" id="">${swimmer.predicted_place_in_swim}</div>
                                </div>
                                <div class="col-12 col-md-6 col-lg-2  ps-2 pt-1 pt-md-0 ">
                                    <div class="text-secondary small">Место (фаза):</div>
                                    <div class="fw-semibold" id="">${swimmer.predicted_place_in_phase}</div>
                                </div>
                                <div class="col-12 col-md-6 col-lg-2 fw-semibold ps-0 d-flex align-items-center ps-2 pe-2 mb-0 pb-1 pt-1">
                                    <button class="btn btn-primary btn-lg w-100 h-100 p-0 m-0"
                                        id=""
                                        onclick="showGraphsModal('${phase}',${i},${j})">Графики...</button>
                                </div>
                            </div>`;
                        swimmersStrArray.push(swimmerStr);
                    }
                    swimsStrArray.push(`<div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                            data-bs-target="#resultsAccordionEntry${phase}${i}" aria-expanded="true"
                            aria-controls="resultsAccordionEntry${phase}${i}">
                            Заплыв ${i + 1} фазы ${phaseText}
                        </button>
                    </h2>
                    <div id="resultsAccordionEntry${phase}${i}" class="accordion-collapse collapse">
                        <div class="accordion-body pt-0 pb-1">
                            ${swimmersStrArray.join('\n')}
                        </div>
                    </div>
                </div>`)
                }
                let phaseStr = swimsStrArray.join('\n');
                return phaseStr
            }
            const innerHTML = `<div class="card bg-body rounded-4 shadow-sm mt-2 ms-1 me-1" id="resultsCard">
        <div class="card-header">
            Предсказанные результаты дисциплины
        </div>
        <div class="card-body m-0 p-0">
            <div id="resultsAccordion" class="accordion accordion-flush m-0 p-0">
            </div>
        </div>
    </div>`;
            document.body.insertAdjacentHTML('beforeend', innerHTML);
            phasesStrArr = []
            if (predictions.heats_phase_swims) {
                phasesStrArr.push(generateInnerHTMLForSinglePhase("Heats"));
            }
            if (predictions.semifinals_phase_swims) {
                phasesStrArr.push(generateInnerHTMLForSinglePhase("Semifinals"));
            }
            if (predictions.finals_phase_swims) {
                phasesStrArr.push(generateInnerHTMLForSinglePhase("Finals"));
            }
            phasesStrCombined = phasesStrArr.join("\n");
            document.getElementById('resultsAccordion').insertAdjacentHTML('beforeend', phasesStrCombined);
        }

        predictions = data;

        //Убрать все предсказания из виду
        clearPredictions();
        //Показать предсказания
        displayPredictions();
    }

    //Функция для форматирования результирующего времени с точность 10^-4 с
    function formatResultTime(totalSeconds) {
        totalSeconds = Math.round(totalSeconds * 10000) / 10000;
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds - hours * 3600) / 60);
        const seconds = Math.floor(totalSeconds % 60);
        const subseconds = Math.round((totalSeconds % 1) * 10000);
        if (hours !== 0) {
            return `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(subseconds).padStart(4, '0')}`;
        }
        if (minutes !== 0) {
            return `${minutes}:${String(seconds).padStart(2, '0')}.${String(subseconds).padStart(4, '0')}`;
        }
        return `${seconds}.${String(subseconds).padStart(4, '0')}`;
    }

    let heightChart = null;
    let ageChart = null;
    let laneChart = null;
    function showGraphsModal(phase, swimInd, swimmerInd) {
        //Получить сведения о текущем пловце
        let chosenSwimmer = null;
        let phaseStr = "";
        if (phase == "Heats") {
            chosenSwimmer = predictions.heats_phase_swims[swimInd].swimmers_array[swimmerInd];
            phaseStr = "отборочных"
        }
        else if (phase == "Semifinals") {
            chosenSwimmer = predictions.semifinals_phase_swims[swimInd].swimmers_array[swimmerInd];
            phaseStr = "полуфинала"
        }
        else {
            chosenSwimmer = predictions.finals_phase_swims[swimInd].swimmers_array[swimmerInd];
            phaseStr = "финала"
        }
        const chosenSwimmerName = allswimmersDict[chosenSwimmer.id].full_name;
        const chosenSwimmerGraphAgeDependency = chosenSwimmer.graph_age_dependency;
        const chosenSwimmerGraphHeightDependency = chosenSwimmer.graph_height_dependency;
        const chosenSwimmerGraphLaneDependency = chosenSwimmer.graph_lane_dependency;
        const chosenSwimmerLane = chosenSwimmer.lane;


        document.getElementById(`graphsModalLabel`).innerHTML = `Графики для пловца ${chosenSwimmerName} в заплыве ${swimInd + 1} фазы ${phaseStr}`;

        document.getElementById('canvasHeightDependency').classList.add('d-none');
        document.getElementById('canvasAgeDependency').classList.add('d-none');
        document.getElementById('canvasLaneDependency').classList.add('d-none');
        const canvasDependencyHeight = document.getElementById('canvasHeightDependency');
        const canvasDependencyAge = document.getElementById('canvasAgeDependency');
        const canvasDependencyLane = document.getElementById('canvasLaneDependency');
        document.getElementById('canvasHeightDependencyLabel').classList.add('d-none');
        document.getElementById('canvasAgeDependencyLabel').classList.add('d-none');
        if (heightChart !== null) {
            heightChart.destroy();
        }
        if (ageChart !== null) {
            ageChart.destroy();
        }
        if (laneChart !== null) {
            laneChart.destroy();
        }
        const modal = new bootstrap.Modal(document.getElementById('graphsModal'));
        modal.show();
        if (!chosenSwimmer.graph_height_dependency) //Проверка на то что есть график зависимости результата от роста
        {
            document.getElementById('canvasHeightDependencyLabel').classList.remove('d-none');
        }
        else {
            let minY = Math.min(...chosenSwimmerGraphHeightDependency.map(p => p.y));  //Минимальное значение Y
            let maxY = Math.max(...chosenSwimmerGraphHeightDependency.map(p => p.y));  //Максимальное значение Y
            let range = maxY - minY;                     //Разница между мин и макс
            let padding = Math.max(0.1, range * 0.1);   //Минимум 0.1 отступ с каждой стороны по Y
            document.getElementById('canvasHeightDependency').classList.remove('d-none');
            heightChart = new Chart(canvasDependencyHeight, {
                type: 'line',
                data: {
                    datasets: [{
                        data: chosenSwimmerGraphHeightDependency.map(i => ({ x: i.x, y: i.y })),
                        pointRadius: chosenSwimmerGraphHeightDependency.map(i => i.is_current_dot ? 7 : 3),  //Выделяем жирным текущую точку
                    }]
                },
                options: {
                    plugins: {
                        title: {
                            display: true,
                            text: 'Зависимость прогноза от роста пловца'
                        },
                        legend: {
                            display: false
                        },
                        tooltip: {
                            displayColors: false,
                            callbacks: {
                                title: function (context) {
                                    return `Рост: ${context[0].raw.x} см`;
                                },
                                label: function (context) {
                                    return `Время: ${context.raw.y.toFixed(4)} сек.`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'linear',
                            title: {
                                display: true,
                                text: 'Рост в см'
                            }
                        },
                        y: {
                            suggestedMin: minY - padding,
                            suggestedMax: maxY + padding,
                            ticks: {
                                stepSize: Math.max(0.1, range / 10)
                            },
                            type: 'linear',
                            title: {
                                display: true,
                                text: 'Время (сек.)'
                            }
                        }
                    }
                }
            })
        }

        if (!chosenSwimmer.dob) //Проверка на то что дата рождения пловца - не null
        {
            document.getElementById('canvasAgeDependencyLabel').classList.remove('d-none');
        }
        else {
            document.getElementById('canvasAgeDependency').classList.remove('d-none');
            let minY = Math.min(...chosenSwimmerGraphAgeDependency.map(p => p.y));  //Минимальное значение Y
            let maxY = Math.max(...chosenSwimmerGraphAgeDependency.map(p => p.y));  //Максимальное значение Y
            let range = maxY - minY;                     //Разница между мин и макс
            let padding = Math.max(0.1, range * 0.1);   //Минимум 0.1 отступ с каждой стороны по Y
            ageChart = new Chart(canvasDependencyAge, {
                type: 'line',
                data: {
                    datasets: [{
                        data: chosenSwimmerGraphAgeDependency.map(i => ({ x: i.x, y: i.y })),
                        pointRadius: chosenSwimmerGraphAgeDependency.map(i => i.is_current_dot ? 7 : 3),  //Выделяем жирным текущую точку
                    }]
                },
                options: {
                    plugins: {
                        title: {
                            display: true,
                            text: 'Зависимость прогноза от возраста пловца'
                        },
                        legend: {
                            display: false
                        },
                        tooltip: {
                            displayColors: false,
                            callbacks: {
                                title: function (context) {
                                    return `Возраст: ${context[0].raw.x}`;
                                },
                                label: function (context) {
                                    return `Время: ${context.raw.y.toFixed(4)} сек.`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'linear',
                            title: {
                                display: true,
                                text: 'Возраст'
                            }
                        },
                        y: {
                            suggestedMin: minY - padding,
                            suggestedMax: maxY + padding,
                            ticks: {
                                stepSize: Math.max(0.1, range / 10)
                            },
                            type: 'linear',
                            title: {
                                display: true,
                                text: 'Время (сек.)'
                            }
                        }
                    }
                }
            });
        }




        let minY = Math.min(...chosenSwimmerGraphLaneDependency.map(p => p.y));  //Минимальное значение Y
        let maxY = Math.max(...chosenSwimmerGraphLaneDependency.map(p => p.y));  //Максимальное значение Y
        let range = maxY - minY;                     //Разница между мин и макс
        let padding = Math.max(0.1, range * 0.1);   //Минимум 0.1 отступ с каждой стороны по Y
        document.getElementById('canvasLaneDependency').classList.remove('d-none');
        laneChart = new Chart(canvasDependencyLane, {
            type: 'line',
            data: {
                datasets: [{
                    data: chosenSwimmerGraphLaneDependency.map(i => ({ x: i.x, y: i.y })),
                    pointRadius: chosenSwimmerGraphLaneDependency.map(i => i.is_current_dot ? 7 : 3),  //Выделяем жирным текущую точку
                }]
            },
            options: {
                plugins: {
                    title: {
                        display: true,
                        text: 'Зависимость прогноза от дорожки пловца'
                    },
                    legend: {
                        display: false
                    },
                    tooltip: {
                        displayColors: false,
                        callbacks: {
                            title: function (context) {
                                return `Дорожка: ${context[0].raw.x}`;
                            },
                            label: function (context) {
                                return `Время: ${context.raw.y.toFixed(4)} сек.`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        type: 'linear',
                        title: {
                            display: true,
                            text: 'Дорожка'
                        }
                    },
                    y: {
                        suggestedMin: minY - padding,
                        suggestedMax: maxY + padding,
                        ticks: {
                            stepSize: Math.max(0.1, range / 10)
                        },
                        type: 'linear',
                        title: {
                            display: true,
                            text: 'Время (сек.)'
                        }
                    }
                }
            }
        });
    }


</script>
